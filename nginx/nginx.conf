events {
    worker_connections 1024;
}

http {
    # Edge rate limiting: 20 requests/sec per client IP, with a small
    # burst allowance. This is the first line of defense against abuse
    # or a runaway client - the app's own @nestjs/throttler (see
    # app.module.ts) is the second, in case a request reaches an app
    # instance directly.
    limit_req_zone $binary_remote_addr zone=edge_limit:10m rate=20r/s;

    upstream nestjs_backend {
        server app1:3000;
        server app2:3000;
    }

    # Plain HTTP - redirect everything to HTTPS.
    server {
        listen 80;
        return 301 https://$host$request_uri;
    }

    server {
        listen 443 ssl;

        # Self-signed cert for local dev (see nginx/certs/README.md for
        # how it's generated). Swap this for a cert-manager/Let's
        # Encrypt/ACM-issued certificate before this touches real
        # traffic - browsers will show a warning for a self-signed cert.
        ssl_certificate     /etc/nginx/certs/fullchain.pem;
        ssl_certificate_key /etc/nginx/certs/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers HIGH:!aNULL:!MD5;

        limit_req zone=edge_limit burst=40 nodelay;

        location / {
            proxy_pass http://nestjs_backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        location /health {
            proxy_pass http://nestjs_backend/health;
        }
    }
}
