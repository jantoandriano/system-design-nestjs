version: "3.9"

services:
  # ---------------------------------------------------------------------
  # MAIN DATABASE (write path)
  # ---------------------------------------------------------------------
  postgres-primary:
    image: bitnami/postgresql:16
    container_name: postgres-primary
    environment:
      POSTGRESQL_REPLICATION_MODE: master
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    volumes:
      - postgres_primary_data:/bitnami/postgresql
    networks:
      - system-design-net
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ---------------------------------------------------------------------
  # DUPLICATE DATABASE (read replica, streams from primary)
  # ---------------------------------------------------------------------
  postgres-replica:
    image: bitnami/postgresql:16
    container_name: postgres-replica
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_REPLICATION_MODE: slave
      POSTGRESQL_REPLICATION_USER: ${POSTGRES_REPLICATION_USER}
      POSTGRESQL_REPLICATION_PASSWORD: ${POSTGRES_REPLICATION_PASSWORD}
      POSTGRESQL_MASTER_HOST: postgres-primary
      POSTGRESQL_MASTER_PORT_NUMBER: 5432
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5433:5432"
    volumes:
      - postgres_replica_data:/bitnami/postgresql
    networks:
      - system-design-net

  # ---------------------------------------------------------------------
  # CONNECTION POOLING
  # Each app instance opening its own pool directly against Postgres
  # doesn't scale past a handful of instances - Postgres has a hard
  # max_connections ceiling (100 by default). PgBouncer sits in front of
  # each database and multiplexes many app-side connections onto a small
  # number of real Postgres connections.
  # ---------------------------------------------------------------------
  pgbouncer-primary:
    image: bitnami/pgbouncer:1
    container_name: pgbouncer-primary
    depends_on:
      postgres-primary:
        condition: service_healthy
    environment:
      POSTGRESQL_HOST: postgres-primary
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "6432:6432"
    networks:
      - system-design-net

  pgbouncer-replica:
    image: bitnami/pgbouncer:1
    container_name: pgbouncer-replica
    depends_on:
      - postgres-replica
    environment:
      POSTGRESQL_HOST: postgres-replica
      POSTGRESQL_PORT: 5432
      POSTGRESQL_USERNAME: ${POSTGRES_USER}
      POSTGRESQL_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRESQL_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_DATABASE: ${POSTGRES_DB}
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: 1000
      PGBOUNCER_DEFAULT_POOL_SIZE: 20
    ports:
      - "6433:6432"
    networks:
      - system-design-net

  # ---------------------------------------------------------------------
  # MESSAGE QUEUE
  # ---------------------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
    ports:
      - "5672:5672"     # AMQP protocol
      - "15672:15672"   # management UI (login with RABBITMQ_USER/PASSWORD)
    networks:
      - system-design-net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------
  # MIGRATIONS
  # Runs once, applies pending migrations directly against the primary
  # (bypassing PgBouncer - DDL behaves more predictably outside a
  # transaction-mode pooler), then exits. app1/app2 wait for this to
  # finish successfully before they start, so nobody boots against a
  # schema mid-migration.
  # ---------------------------------------------------------------------
  migrate:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: migrate
    env_file: .env
    entrypoint: ["node", "node_modules/.bin/typeorm", "migration:run", "-d", "dist/database/data-source.js"]
    depends_on:
      postgres-primary:
        condition: service_healthy
    networks:
      - system-design-net

  # ---------------------------------------------------------------------
  # APP INSTANCES (identical, horizontally scaled behind nginx)
  # ---------------------------------------------------------------------
  app1:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app1
    env_file: .env
    environment:
      INSTANCE_NAME: app1
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer-primary:
        condition: service_started
      pgbouncer-replica:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      system-design-net:
        # Shared alias so the Next.js client's server-side calls (see
        # `client` service) round-robin across app1/app2 via Docker's
        # embedded DNS, the same way nginx's upstream does for external
        # traffic - without the client needing to trust nginx's
        # self-signed cert for internal calls.
        aliases:
          - nestjs-backend

  app2:
    build:
      context: ./app
      dockerfile: Dockerfile
    container_name: app2
    env_file: .env
    environment:
      INSTANCE_NAME: app2
    depends_on:
      migrate:
        condition: service_completed_successfully
      pgbouncer-primary:
        condition: service_started
      pgbouncer-replica:
        condition: service_started
      rabbitmq:
        condition: service_healthy
    networks:
      system-design-net:
        aliases:
          - nestjs-backend

  # ---------------------------------------------------------------------
  # FRONTEND (Next.js) - BFF that bridges the raw JWT from POST
  # /auth/login into an httpOnly cookie (see client/lib/session.ts).
  # Talks to the backend directly over the internal network
  # (INTERNAL_API_URL), never through nginx. Not published on a host
  # port - nginx is the only public entrypoint, same as app1/app2.
  # ---------------------------------------------------------------------
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: client
    env_file: .env
    depends_on:
      - app1
      - app2
    networks:
      - system-design-net

  # ---------------------------------------------------------------------
  # LOAD BALANCER (single entrypoint for clients)
  # ---------------------------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: load-balancer
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app1
      - app2
      - client
    networks:
      - system-design-net

  # ---------------------------------------------------------------------
  # OBSERVABILITY
  # ---------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - system-design-net

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    environment:
      # Placeholder - change on first login, or set via env for automated setups.
      GF_SECURITY_ADMIN_PASSWORD: changeme_grafana_password
    volumes:
      - grafana_data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
    ports:
      - "3003:3000"
    depends_on:
      - prometheus
    networks:
      - system-design-net

networks:
  system-design-net:
    driver: bridge

volumes:
  postgres_primary_data:
  postgres_replica_data:
  prometheus_data:
  grafana_data:
